name: WorkProfile CI

on:
  push:
    branches:
      - main
      - multi-stage

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build Docker image
        run: docker build -t ghcr.io/miriroth123/workprofile:latest .

      - name: Push Docker image
        run: docker push ghcr.io/miriroth123/workprofile:latest

      - name: Run container in background
        run: docker run -d --name workprofile_test -p 8080:5000 ghcr.io/miriroth123/workprofile:latest

      - name: Wait for app to start
        run: sleep 15

      - name: Test root endpoint
        run: curl --fail http://localhost:8080/

      - name: Test health endpoint
        run: curl --fail http://localhost:8080/health

      - name: Stop and remove container
        run: |
          docker stop workprofile_test
          docker rm workprofile_test
